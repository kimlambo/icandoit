<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICanDoIt — 미국 주식 트레이더 대시보드</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="theme-dark">

  <header class="app-header">
    <div class="app-title">
      <span class="app-logo">📈</span>
      <span>ICanDoIt</span>
    </div>
    <div class="app-header-meta">
      <button type="button" id="currency-toggle" class="currency-toggle-btn">$ USD</button>
      <span class="market-status-badge" id="market-status">장 마감</span>
      <span class="last-updated" id="last-updated">마지막 업데이트: --:--</span>
    </div>
  </header>

  <div class="search-section">
    <div class="search-box">
      <input
        type="text"
        id="search-input"
        class="search-input"
        placeholder="종목 검색 (티커 또는 회사명, 예: AAPL, Apple)"
        autocomplete="off"
      />
      <div id="search-results" class="search-results hidden"></div>
    </div>
  </div>

  <nav class="tab-nav" role="tablist">
    <button class="tab-btn active" data-tab="watchlist" role="tab" aria-selected="true">정규장</button>
    <button class="tab-btn" data-tab="gainers" role="tab" aria-selected="false">급상승 종목</button>
    <button class="tab-btn" data-tab="losers" role="tab" aria-selected="false">급하락 종목</button>
  </nav>

  <main class="tab-panels">
    <section id="panel-watchlist" class="tab-panel active" role="tabpanel">
      <div class="panel-toolbar">
        <select class="sector-filter" data-panel="watchlist">
          <option value="">전체 산업</option>
          <option value="반도체">반도체</option>
          <option value="자동차">자동차</option>
          <option value="금융">금융</option>
          <option value="헬스케어">헬스케어</option>
          <option value="스포츠/의류">스포츠/의류</option>
          <option value="기술">기술</option>
          <option value="에너지">에너지</option>
          <option value="미디어/엔터">미디어/엔터</option>
          <option value="소비재">소비재</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="table-scroll">
        <table class="stock-table" data-panel="watchlist">
          <thead>
            <tr>
              <th>티커</th>
              <th>종목명</th>
              <th>산업</th>
              <th class="num">현재가</th>
              <th class="num">등락률</th>
              <th class="num">거래량</th>
              <th class="num sortable" data-sort-key="marketCap">시가총액</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="panel-gainers" class="tab-panel" role="tabpanel">
      <p id="gainers-live-note" class="live-status-note hidden">실시간 스크리너 호출 한도를 초과해 참고용 목록을 표시하고 있습니다 (매일 초기화).</p>
      <div class="panel-toolbar">
        <select class="sector-filter" data-panel="gainers">
          <option value="">전체 산업</option>
          <option value="반도체">반도체</option>
          <option value="자동차">자동차</option>
          <option value="금융">금융</option>
          <option value="헬스케어">헬스케어</option>
          <option value="스포츠/의류">스포츠/의류</option>
          <option value="기술">기술</option>
          <option value="에너지">에너지</option>
          <option value="미디어/엔터">미디어/엔터</option>
          <option value="소비재">소비재</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="table-scroll">
        <table class="stock-table" data-panel="gainers">
          <thead>
            <tr>
              <th>티커</th>
              <th>종목명</th>
              <th>산업</th>
              <th class="num">현재가</th>
              <th class="num">등락률</th>
              <th class="num">거래량</th>
              <th class="num sortable" data-sort-key="marketCap">시가총액</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>

    <section id="panel-losers" class="tab-panel" role="tabpanel">
      <p id="losers-live-note" class="live-status-note hidden">실시간 스크리너 호출 한도를 초과해 참고용 목록을 표시하고 있습니다 (매일 초기화).</p>
      <div class="panel-toolbar">
        <select class="sector-filter" data-panel="losers">
          <option value="">전체 산업</option>
          <option value="반도체">반도체</option>
          <option value="자동차">자동차</option>
          <option value="금융">금융</option>
          <option value="헬스케어">헬스케어</option>
          <option value="스포츠/의류">스포츠/의류</option>
          <option value="기술">기술</option>
          <option value="에너지">에너지</option>
          <option value="미디어/엔터">미디어/엔터</option>
          <option value="소비재">소비재</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="table-scroll">
        <table class="stock-table" data-panel="losers">
          <thead>
            <tr>
              <th>티커</th>
              <th>종목명</th>
              <th>산업</th>
              <th class="num">현재가</th>
              <th class="num">등락률</th>
              <th class="num">거래량</th>
              <th class="num sortable" data-sort-key="marketCap">시가총액</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="stock-modal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-box" role="dialog" aria-modal="true">
      <button class="modal-close" aria-label="닫기">×</button>

      <header class="modal-header" id="modal-header"></header>

      <nav class="modal-tab-nav">
        <button class="modal-tab-btn active" data-modal-tab="chart">차트</button>
        <button class="modal-tab-btn" data-modal-tab="news">뉴스</button>
        <button class="modal-tab-btn" data-modal-tab="earnings">어닝</button>
        <button class="modal-tab-btn" data-modal-tab="sentiment">SNS 여론</button>
        <button class="modal-tab-btn" data-modal-tab="risk">리스크</button>
      </nav>

      <div class="modal-tab-panels">
        <div id="modal-panel-chart" class="modal-tab-panel active"></div>
        <div id="modal-panel-news" class="modal-tab-panel"></div>
        <div id="modal-panel-earnings" class="modal-tab-panel"></div>
        <div id="modal-panel-sentiment" class="modal-tab-panel"></div>
        <div id="modal-panel-risk" class="modal-tab-panel"></div>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="mockData.js"></script>
  <script src="dataService.js"></script>
  <script src="ui.js"></script>
  <script src="script.js"></script>
</body>
</html>
